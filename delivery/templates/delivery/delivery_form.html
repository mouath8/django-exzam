{% extends 'base.html' %}

{% block title %}
    {% if delivery %}تعديل التوصيلة{% else %}إضافة توصيلة جديدة{% endif %}
{% endblock %}

{% block content %}
<div style="max-width:500px; margin:0 auto; background:white; padding:30px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.1);">

    <h2 style="color:#2c3e50;">
        {% if delivery %}✏️ تعديل التوصيلة #{{ delivery.order_id }}{% else %}🚚 إضافة توصيلة جديدة{% endif %}
    </h2>

    <form method="POST">
        {% csrf_token %}

        <!-- حقل اسم المندوب -->
        <div style="margin-bottom:15px;">
            <label style="display:block; margin-bottom:5px; font-weight:bold; color:#555;">اسم المندوب</label>
            <input type="text" name="delivery_person" required
                   value="{{ delivery.delivery_person|default:'' }}"
                   style="width:100%; padding:8px; border:1px solid #ddd; border-radius:4px; box-sizing:border-box;">
        </div>

        <!-- حقل رقم الهاتف -->
        <div style="margin-bottom:15px;">
            <label style="display:block; margin-bottom:5px; font-weight:bold; color:#555;">رقم الهاتف</label>
            <input type="text" name="phone" required
                   value="{{ delivery.phone|default:'' }}"
                   style="width:100%; padding:8px; border:1px solid #ddd; border-radius:4px; box-sizing:border-box;">
        </div>

        <!-- حقل رقم الطلب -->
        <div style="margin-bottom:15px;">
            <label style="display:block; margin-bottom:5px; font-weight:bold; color:#555;">رقم الطلب</label>
            <input type="number" name="order_id" required
                   value="{{ delivery.order_id|default:'' }}"
                   style="width:100%; padding:8px; border:1px solid #ddd; border-radius:4px; box-sizing:border-box;">
        </div>

        <!-- حقل الحالة -->
        <div style="margin-bottom:15px;">
            <label style="display:block; margin-bottom:5px; font-weight:bold; color:#555;">الحالة</label>
            <select name="status" style="width:100%; padding:8px; border:1px solid #ddd; border-radius:4px;">
                <!-- selected يظهر القيمة الحالية عند التعديل -->
                <option value="pending"     {% if delivery.status == 'pending' %}selected{% endif %}>قيد الانتظار</option>
                <option value="in_progress" {% if delivery.status == 'in_progress' %}selected{% endif %}>جاري التوصيل</option>
                <option value="delivered"   {% if delivery.status == 'delivered' %}selected{% endif %}>تم التوصيل</option>
                <option value="cancelled"   {% if delivery.status == 'cancelled' %}selected{% endif %}>ملغي</option>
            </select>
        </div>

        <div style="display:flex; gap:10px; margin-top:20px;">
            <button type="submit" style="flex:1; padding:10px; background:#1abc9c; color:white; border:none; border-radius:4px; font-size:15px; cursor:pointer;">
                💾 حفظ
            </button>
            <a href="{% url 'delivery:delivery_list' %}" style="flex:1; padding:10px; background:#95a5a6; color:white; border-radius:4px; text-decoration:none; text-align:center; font-size:15px;">
                ❌ إلغاء
            </a>
        </div>
    </form>
</div>
{% endblock %}
