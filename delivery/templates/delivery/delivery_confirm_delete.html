{% extends 'base.html' %}

{% block title %}تأكيد حذف التوصيلة{% endblock %}

{% block content %}
<div style="max-width:450px; margin:60px auto; background:white; padding:30px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.1); text-align:center;">

    <div style="font-size:50px; margin-bottom:15px;">⚠️</div>
    <h2 style="color:#e74c3c;">تأكيد الحذف</h2>

    <p style="color:#555; font-size:16px;">
        هل أنت متأكد من حذف توصيلة المندوب:
        <strong style="color:#2c3e50;">{{ delivery.delivery_person }}</strong>
        <br>
        رقم الطلب: <strong>#{{ delivery.order_id }}</strong>؟
        <br>
        <small style="color:#e74c3c;">لا يمكن التراجع عن هذا الإجراء!</small>
    </p>

    <form method="POST" style="margin-top:20px; display:flex; gap:10px; justify-content:center;">
        {% csrf_token %}
        <button type="submit" style="padding:10px 25px; background:#e74c3c; color:white; border:none; border-radius:4px; font-size:15px; cursor:pointer;">
            🗑️ نعم، احذف
        </button>
        <a href="{% url 'delivery:delivery_list' %}" style="padding:10px 25px; background:#95a5a6; color:white; border-radius:4px; text-decoration:none; font-size:15px;">
            ❌ إلغاء
        </a>
    </form>
</div>
{% endblock %}
