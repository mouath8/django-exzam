{% extends 'base.html' %}

{% block title %}تسجيل الدخول{% endblock %}

{% block content %}
<div style="max-width:400px; margin:40px auto; background:white; padding:30px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.1);">
    <h2 style="text-align:center; color:#2c3e50;">🔐 تسجيل الدخول</h2>

    <form method="POST">
        {% csrf_token %} <!-- حماية ضرورية في كل نموذج POST -->

        {% for field in form %}
            <div style="margin-bottom:15px;">
                <label style="display:block; margin-bottom:5px; font-weight:bold; color:#555;">
                    {{ field.label }}
                </label>
                {{ field }}
                {% if field.errors %}
                    <p style="color:red; font-size:13px;">{{ field.errors.0 }}</p>
                {% endif %}
            </div>
        {% endfor %}

        <button type="submit" style="width:100%; padding:10px; background:#2c3e50; color:white; border:none; border-radius:4px; font-size:16px; cursor:pointer;">
            دخول
        </button>
    </form>

    <p style="text-align:center; margin-top:15px; color:#666;">
        ليس لديك حساب؟
        <a href="{% url 'accounts:register' %}" style="color:#1abc9c;">إنشاء حساب جديد</a>
    </p>
</div>
{% endblock %}
